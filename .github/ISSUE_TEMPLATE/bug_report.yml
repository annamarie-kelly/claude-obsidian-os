name: Bug report
description: Something's broken. Report it.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Before filing, please check the [complete guide](https://annamarie-kelly.github.io/loops-os/) and existing [issues](https://github.com/annamarie-kelly/loops-os/issues) — your problem might already be answered or tracked.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: I expected X but got Y when I did Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Step-by-step.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected the loop to land in Triage with status 'triage'.
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Run `node -v`
      placeholder: v20.10.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (manual install)
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if relevant)
      placeholder: Chrome 130
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      description: Open DevTools, copy any red errors. Trim secrets.
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, surrounding context, anything that helps.
    validations:
      required: false
